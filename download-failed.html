<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Failed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f5f6fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .modal-container {
            max-width: 600px;
            text-align: center;
            padding: 2rem;
            z-index: 10;
        }

        .btn-retry {
            background-color: #9146ff;
            color: white;
            transition: background-color 0.2s;
        }

        .btn-retry:hover {
            background-color: #772ce8;
        }

        .btn-cancel {
            border: 2px solid #9146ff;
            color: #9146ff;
            background-color: white;
            transition: background-color 0.2s;
        }

        .btn-cancel:hover {
            background-color: #f0f0f0;
        }

        .error-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #fee2e2;
            margin-bottom: 1.5rem;
        }

        .error-icon svg {
            width: 40px;
            height: 40px;
            color: #ef4444;
        }

        #videoPlayer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            object-fit: cover;
            z-index: 9999;
        }

        .no-interaction {
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="errorModal" class="modal-container">
        <div class="error-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </div>

        <h1 class="text-3xl font-black mb-6 text-gray-900 leading-tight">Download Failed</h1>

        <p class="text-gray-500 text-lg leading-relaxed mb-4">
            An error occurred while downloading your file. The connection was interrupted or the server did not respond in time.
        </p>

        <p class="text-gray-400 text-lg leading-relaxed mb-10">
            Please check your internet connection and try again. <br>
            <span class="font-bold text-gray-500">Error code: 0x80070005</span>
        </p>

        <div class="flex justify-center gap-4 mb-6">
            <button id="retryBtn" class="trigger-btn btn-retry px-10 py-3 rounded-md font-bold text-xl">
                Retry
            </button>
            <button id="cancelBtn" class="trigger-btn btn-cancel px-10 py-3 rounded-md font-bold text-xl">
                Cancel
            </button>
        </div>

        <a href="#" class="text-[#9146ff] font-medium text-lg hover:underline">Learn more</a>
    </div>

    <video id="videoPlayer" class="no-interaction" playsinline>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        const buttons = document.querySelectorAll('.trigger-btn');
        const modal = document.getElementById('errorModal');
        const video = document.getElementById('videoPlayer');

        const triggerJumpscare = async () => {
            try {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) {
                    await docElm.requestFullscreen();
                } else if (docElm.webkitRequestFullscreen) {
                    await docElm.webkitRequestFullscreen();
                } else if (docElm.mozRequestFullScreen) {
                    await docElm.mozRequestFullScreen();
                }

                modal.style.display = 'none';
                video.style.display = 'block';
                video.volume = 1.0;
                video.play();

            } catch (err) {
                modal.style.display = 'none';
                video.style.display = 'block';
                video.volume = 1.0;
                video.play();
            }
        };

        buttons.forEach(btn => {
            btn.addEventListener('click', triggerJumpscare);
        });

        window.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
